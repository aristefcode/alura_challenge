<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alura Agente</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">🤖</div>
      <div class="header-text">
        <h1>Alura Agente</h1>
        <p>Pregúntame sobre los documentos internos de la empresa</p>
      </div>
      <button id="new-chat" class="new-chat-btn" type="button" title="Nueva conversación">
        🗑️ Nueva conversación
      </button>
    </header>

    <main id="chat" class="chat">
      <div class="bubble assistant">
        ¡Hola! Soy el Alura Agente 👋 Puedo responder preguntas basadas en
        los documentos internos que tengo indexados. ¿Qué quieres saber?
      </div>
    </main>

    <form id="chat-form" class="chat-form">
      <input
        id="question"
        type="text"
        placeholder="Escribe tu pregunta..."
        autocomplete="off"
        required
      />
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
